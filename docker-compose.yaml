name: termincount

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
      - postgresql.env
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_database
      POSTGRES_USER_FILE: /run/secrets/db_username
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_database
      - db_username
      - db_password
    volumes:
      - ./data/postgres:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$(cat /run/secrets/db_username)\" -d \"$$(cat /run/secrets/db_database)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  termincount:
    image: termindiego25/termincount:latest
    restart: unless-stopped
    env_file:
      - termincount.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME_FILE: /run/secrets/db_database
      DB_USER_FILE: /run/secrets/db_username
      DB_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_database
      - db_username
      - db_password
    ports:
      - "${TERMINCOUNT_PORT:-8080}:3000"

secrets:
  db_database:
    file: secrets/credentials/db_database.txt
  db_username:
    file: secrets/credentials/db_username.txt
  db_password:
    file: secrets/credentials/db_password.txt

networks:
  default:
    name: termincount_net
