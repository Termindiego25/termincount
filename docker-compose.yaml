name: termincount
services:
  termincount:
    container_name: termincount
    image: termincount:latest
    build:
      context: .
    restart: unless-stopped
    environment:
      - TERMINCOUNT_DOMAIN=localhost
    ports:
      - "8080:80"
      # Uncomment the next line and the volume below to enable HTTPS locally.
      # - "8443:443"
    # volumes:
    #   - "./ssl:/etc/termincount/certs:ro"

networks:
  default:
    name: termincount_net
